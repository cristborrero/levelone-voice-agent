tasks:
  call_brain:
    provider: openai
    model: gpt-4o
    description: "Main conversation LLM for live calls"
    fallback:
      provider: groq
      model: llama-3.3-70b-versatile

  summary:
    provider: groq
    model: llama-3.3-70b-versatile
    description: "Call summary generation (cheap/fast)"
    fallback: null

  classification:
    provider: groq
    model: llama-3.3-70b-versatile
    description: "Lead stage classification"
    fallback: null

  email_draft:
    provider: groq
    model: llama-3.3-70b-versatile
    description: "Post-call email drafting"
    fallback: null

  lead_scoring:
    provider: groq
    model: llama-3.3-70b-versatile
    description: "Lead scoring and qualification"
    fallback: null

providers:
  openai:
    env_key: OPENAI_API_KEY
    base_url: https://api.openai.com/v1
    models:
      - gpt-4o
      - gpt-4o-mini
      - gpt-3.5-turbo

  groq:
    env_key: GROQ_API_KEY
    base_url: https://api.groq.com/openai/v1
    models:
      - llama-3.3-70b-versatile
      - llama-3.1-8b-instant
      - mixtral-8x7b-32768
