tasks:
  call_brain:
    provider: openai
    model: gpt-4o
    description: "Main conversation LLM for live calls — ALEX persona injected by voice_agent.py directly"
    fallback:
      provider: groq
      model: llama-3.3-70b-versatile

  summary:
    provider: groq
    model: llama-3.3-70b-versatile
    description: "Post-call structured debrief — Sales Coach persona"
    persona: agent_personas/summary.txt
    fallback: null

  classification:
    provider: groq
    model: llama-3.3-70b-versatile
    description: "Lead pipeline stage classification — Deal Strategist persona"
    persona: agent_personas/classification.txt
    fallback: null

  email_draft:
    provider: groq
    model: llama-3.3-70b-versatile
    description: "Post-call follow-up email — Outbound Strategist persona"
    persona: agent_personas/email_draft.txt
    fallback: null

  lead_scoring:
    provider: groq
    model: llama-3.3-70b-versatile
    description: "Lead score 0-100 — Pipeline Analyst persona"
    persona: agent_personas/lead_scoring.txt
    fallback: null

providers:
  openai:
    env_key: OPENAI_API_KEY
    base_url: https://api.openai.com/v1
    models:
      - gpt-4o
      - gpt-4o-mini
      - gpt-3.5-turbo

  groq:
    env_key: GROQ_API_KEY
    base_url: https://api.groq.com/openai/v1
    models:
      - llama-3.3-70b-versatile
      - llama-3.1-8b-instant
      - mixtral-8x7b-32768
